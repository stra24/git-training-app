<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ECポータル</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; margin: 24px; }
    h1 { margin: 0 0 16px; }
    .grid { display: flex; gap: 16px; align-items: flex-start; }
    .col { flex: 1; min-width: 340px; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 12px 14px; }
    .card h2 { margin: 0 0 12px; font-size: 1.05rem; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border-bottom: 1px solid #eee; padding: 8px 6px; text-align: left; }
    th { background: #f6f6f6; }
    .muted { color: #666; font-size: 0.9rem; margin-top: 10px; }
    .badge { display: inline-block; border: 1px solid #ddd; border-radius: 999px; padding: 2px 10px; font-size: 0.85rem; color: #444; }
  </style>
</head>
<body>
<h1>ECポータル <span class="badge">Demo</span></h1>

<div class="grid">
  <!-- 左：新着商品 -->
  <div class="col card">
    <h2>新着商品</h2>
    <table>
      <thead>
      <tr><th style="width: 140px;">日付</th><th>商品名</th></tr>
      </thead>
      <tbody>
      <tr th:each="p : ${newArrivals}">
        <td th:text="${p.date()}"></td>
        <td th:text="${p.name()}"></td>
      </tr>
      </tbody>
    </table>
  </div>

  <!-- 右：クーポン・キャンペーン -->
  <div class="col card">
    <h2>クーポン・キャンペーン</h2>
    <table>
      <thead>
      <tr><th style="width: 140px;">日付</th><th>内容</th></tr>
      </thead>
      <tbody>
      <tr th:each="c : ${campaigns}">
        <td th:text="${c.date()}"></td>
        <td th:text="${c.title()}"></td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
